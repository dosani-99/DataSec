<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>지뢰찾기 메모리 해킹 실습 v2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #008080; font-family: Tahoma, sans-serif; font-size: 12px; padding: 8px; }

.window { border: 2px solid; border-color: #dfdfdf #808080 #808080 #dfdfdf; background: #d4d0c8; margin-bottom: 8px; }
.titlebar { background: linear-gradient(to right, #0a246a, #a6caf0); padding: 3px 5px; display: flex; align-items: center; justify-content: space-between; }
.tlabel { color: #fff; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 4px; }
.tbtns { display: flex; gap: 2px; }
.tbtn { width: 16px; height: 14px; font-size: 9px; border: 1px solid; border-color: #fff #808080 #808080 #fff; background: #d4d0c8; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.winbody { padding: 6px; }

/* Minesweeper */
.mine-hdr { border: 2px solid; border-color: #808080 #fff #fff #808080; padding: 4px 6px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; background: #d4d0c8; }
.lcd { background: #000; color: #f00; font-family: 'Courier New', monospace; font-size: 20px; font-weight: bold; padding: 1px 4px; min-width: 52px; text-align: right; letter-spacing: 2px; border: 2px inset #808080; }
.face-btn { width: 30px; height: 28px; background: #d4d0c8; border: 2px solid; border-color: #fff #808080 #808080 #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; }
.face-btn:active { border-color: #808080 #fff #fff #808080; }
.mine-board { display: inline-grid; grid-template-columns: repeat(9, 26px); border: 2px solid; border-color: #808080 #fff #fff #808080; }
.cell { width: 26px; height: 26px; background: #d4d0c8; border: 2px solid; border-color: #fff #808080 #808080 #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; cursor: pointer; font-family: 'Courier New', monospace; user-select: none; }
.cell:active { border-color: #808080; }
.cell.open { border: 1px solid #aaa; background: #c8c8c8; cursor: default; }
.cell.flag { color: #f00; }
.cell.boom { background: #f00; }
.n1{color:#00f}.n2{color:#070}.n3{color:#f00}.n4{color:#00007b}.n5{color:#7b0000}.n6{color:#007b7b}.n7{color:#000}.n8{color:#888}

/* Guide */
.guide { background: #fffbe0; border: 1px solid #c8a000; padding: 6px 10px; margin-bottom: 6px; line-height: 1.7; color: #4a3000; }
.guide b { color: #000; }
.action { display: inline-block; background: #000080; color: #fff; padding: 0 6px; font-size: 11px; }
.steps { display: flex; gap: 2px; margin-bottom: 6px; flex-wrap: wrap; }
.step { padding: 2px 10px; border: 1px solid #808080; background: #d4d0c8; color: #888; font-size: 11px; }
.step.active { background: #000080; color: #fff; border-color: #000080; }
.step.done { background: #90c090; color: #003000; border-color: #509050; }

/* MHS */
.mhs-panel { border: 1px solid #808080; margin-bottom: 5px; }
.mhs-ptitle { background: #000080; color: #fff; font-size: 11px; font-weight: bold; padding: 2px 6px; }
.mhs-pc { padding: 5px; }
.mhs-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
.mhs-lbl { font-size: 11px; color: #000; min-width: 68px; }
.mhs-inp { border: 2px inset #808080; padding: 2px 4px; font-size: 11px; font-family: 'Courier New', monospace; background: #fff; width: 72px; }
.mhs-btn { background: #d4d0c8; border: 2px solid; border-color: #fff #808080 #808080 #fff; padding: 2px 10px; font-size: 11px; cursor: pointer; white-space: nowrap; }
.mhs-btn:hover { background: #e4e0d8; }
.mhs-btn:active { border-color: #808080 #fff #fff #808080; }
.mhs-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Result table */
.scroll-tbl { max-height: 200px; overflow-y: auto; border: 1px inset #808080; }
.mhs-tbl { width: 100%; border-collapse: collapse; font-size: 11px; font-family: 'Courier New', monospace; }
.mhs-tbl th { background: #000080; color: #fff; padding: 2px 5px; text-align: left; font-weight: normal; position: sticky; top: 0; }
.mhs-tbl td { padding: 2px 5px; border-bottom: 1px solid #e8e8e8; }
.mhs-tbl tr.cand td { background: #fffff0; }
.mhs-tbl tr.rem td { color: #bbb; }
.mhs-tbl tr.found td { background: #90ff90; font-weight: bold; }
/* 값 종류별 색상 */
.tag { display: inline-block; font-size: 10px; padding: 0 4px; border-radius: 2px; font-family: Tahoma, sans-serif; }
.tag-timer { background: #ff4444; color: #fff; }
.tag-flag  { background: #4488ff; color: #fff; }
.tag-open  { background: #44aa44; color: #fff; }
.tag-zero  { background: #aaa; color: #fff; }
.tag-found { background: #ff8800; color: #fff; }

.mhs-log { background: #000; color: #0f0; font-family: 'Courier New', monospace; font-size: 11px; padding: 4px; height: 68px; overflow-y: auto; margin-top: 4px; }
.mhs-log .w { color: #ff0; }
.mhs-log .e { color: #f00; }

/* Legend */
.legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 5px; font-size: 11px; }
.leg-item { display: flex; align-items: center; gap: 3px; }
</style>
</head>
<body>

<div class="guide" id="guide">
  <b>📌 1단계:</b> 지뢰찾기 칸을 <span class="action">클릭</span> 해서 게임을 시작하세요.
</div>
<div class="steps">
  <div class="step active" id="st0">1. 게임 시작</div>
  <div class="step" id="st1">2. 메모리 검색</div>
  <div class="step" id="st2">3. 범위 좁히기</div>
  <div class="step" id="st3">4. 값 수정</div>
</div>

<!-- Minesweeper -->
<div class="window">
  <div class="titlebar">
    <div class="tlabel">💣 지뢰찾기</div>
    <div class="tbtns"><div class="tbtn">_</div><div class="tbtn">□</div><div class="tbtn" onclick="resetGame()">✕</div></div>
  </div>
  <div class="winbody">
    <div class="mine-hdr">
      <div class="lcd" id="lcd-mines">010</div>
      <div class="face-btn" id="face" onclick="resetGame()">🙂</div>
      <div class="lcd" id="lcd-timer">000</div>
    </div>
    <div class="mine-board" id="board"></div>
  </div>
</div>

<!-- MHS -->
<div class="window">
  <div class="titlebar">
    <div class="tlabel">🔧 Memory Hacking Software — [Winmine_XP.exe]</div>
    <div class="tbtns"><div class="tbtn">_</div><div class="tbtn">□</div><div class="tbtn">✕</div></div>
  </div>
  <div class="winbody">

    <div class="mhs-panel">
      <div class="mhs-ptitle">메모리 검색</div>
      <div class="mhs-pc">
        <div class="mhs-row">
          <span class="mhs-lbl">검색 값:</span>
          <input class="mhs-inp" id="sval" value="0" type="number" min="0">
          <button class="mhs-btn" id="sbtn" onclick="doSearch()" disabled>검색 시작</button>
          <button class="mhs-btn" id="subbtn" onclick="doSub()" disabled>서브 검색</button>
        </div>
        <div class="mhs-row">
          <span class="mhs-lbl">결과 수:</span>
          <span id="rcnt" style="font-family:'Courier New',monospace">-</span>
        </div>
      </div>
    </div>

    <!-- Legend -->
    <div class="legend" id="legend" style="display:none; padding: 0 5px 4px;">
      <span style="font-size:11px; color:#555; align-self:center;">값 종류:</span>
      <span class="leg-item"><span class="tag tag-timer">타이머</span> 1초마다 +1 증가</span>
      <span class="leg-item"><span class="tag tag-flag">깃발수</span> 깃발 꽂으면 변화</span>
      <span class="leg-item"><span class="tag tag-open">열린칸</span> 칸 클릭하면 변화</span>
      <span class="leg-item"><span class="tag tag-zero">빈공간</span> 항상 0</span>
    </div>

    <div class="mhs-panel">
      <div class="mhs-ptitle">검색 결과 — 각 주소에 저장된 값의 의미</div>
      <div class="scroll-tbl">
        <table class="mhs-tbl">
          <thead><tr><th>주소</th><th>저장된 값의 의미</th><th>이전</th><th>현재</th><th>변화</th></tr></thead>
          <tbody id="rtbody"></tbody>
        </table>
      </div>
    </div>

    <div class="mhs-panel" id="modpanel" style="opacity:0.4">
      <div class="mhs-ptitle">값 수정 (타이머 조작)</div>
      <div class="mhs-pc">
        <div class="mhs-row">
          <span class="mhs-lbl">타겟 주소:</span>
          <span id="taddr" style="font-family:'Courier New',monospace;font-size:11px">-</span>
        </div>
        <div class="mhs-row">
          <span class="mhs-lbl">새 값:</span>
          <input class="mhs-inp" id="nval" value="1" type="number" min="0" max="999">
          <button class="mhs-btn" id="modbtn" onclick="doModify()" disabled>값 쓰기</button>
        </div>
      </div>
    </div>

    <div class="mhs-log" id="mlog"></div>
  </div>
</div>

<script>
const ROWS = 9, COLS = 9, TOTAL = 81, MINE_N = 10;

// 각 주소에 어떤 값이 저장되는지 정의
const ADDR_INFO = [
  { addr: "0x00403A10", type: "zero",  label: "빈 공간 (초기화 영역)",      tag: "tag-zero"  },
  { addr: "0x00403B44", type: "timer", label: "⏱ 타이머 (경과 시간)",        tag: "tag-timer" },
  { addr: "0x00404C22", type: "open",  label: "열린 칸 수",                  tag: "tag-open"  },
  { addr: "0x7FFD0018", type: "zero",  label: "빈 공간 (사용 안 함)",        tag: "tag-zero"  },
  { addr: "0x00403D88", type: "flag",  label: "🚩 남은 깃발 수",             tag: "tag-flag"  },
  { addr: "0x7FFD0044", type: "zero",  label: "빈 공간 (사용 안 함)",        tag: "tag-zero"  },
  { addr: "0x00405120", type: "zero",  label: "빈 공간 (초기화 영역)",       tag: "tag-zero"  },
  { addr: "0x7FFD0088", type: "zero",  label: "빈 공간 (사용 안 함)",        tag: "tag-zero"  },
  { addr: "0x00403F60", type: "open",  label: "클릭된 칸 누적 수",           tag: "tag-open"  },
  { addr: "0x7FFE0010", type: "zero",  label: "빈 공간 (사용 안 함)",        tag: "tag-zero"  },
  { addr: "0x00406244", type: "zero",  label: "빈 공간 (초기화 영역)",       tag: "tag-zero"  },
  { addr: "0x7FFE0020", type: "zero",  label: "빈 공간 (사용 안 함)",        tag: "tag-zero"  },
  { addr: "0x00403A90", type: "zero",  label: "빈 공간 (초기화 영역)",       tag: "tag-zero"  },
  { addr: "0x7FFF0100", type: "zero",  label: "빈 공간 (사용 안 함)",        tag: "tag-zero"  },
  { addr: "0x00407888", type: "zero",  label: "빈 공간 (초기화 영역)",       tag: "tag-zero"  },
  { addr: "0x7FFF0200", type: "zero",  label: "빈 공간 (사용 안 함)",        tag: "tag-zero"  },
  { addr: "0x00403C14", type: "zero",  label: "빈 공간 (초기화 영역)",       tag: "tag-zero"  },
  { addr: "0x7FFF0300", type: "zero",  label: "빈 공간 (사용 안 함)",        tag: "tag-zero"  },
  { addr: "0x00408010", type: "zero",  label: "빈 공간 (초기화 영역)",       tag: "tag-zero"  },
  { addr: "0x7FFF0400", type: "zero",  label: "빈 공간 (사용 안 함)",        tag: "tag-zero"  },
];

const TARGET = "0x00403B44";
const FILTER_ROUNDS = [
  ADDR_INFO.map(a => a.addr),
  ["0x00403A10","0x00403B44","0x00404C22","0x00403D88","0x00403F60"],
  ["0x00403B44","0x00404C22"],
  ["0x00403B44"]
];

let cells = [], mines = new Set(), revealed = new Set(), flagged = new Set();
let state = "idle", gTime = 0, openCount = 0, ticker = null;
let searched = false, fRound = 0, prevT = 0, prevOpen = 0, prevFlag = 0;

function getVal(info) {
  if (info.type === "timer") return gTime;
  if (info.type === "flag")  return flagged.size;
  if (info.type === "open")  return info.addr === "0x00404C22" ? revealed.size : openCount;
  return 0;
}

function mlog(msg, cls) {
  const el = document.getElementById("mlog");
  const d = document.createElement("div");
  if (cls) d.className = cls;
  d.textContent = "> " + msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function setStep(n) {
  ["st0","st1","st2","st3"].forEach((id, i) => {
    document.getElementById(id).className = "step" + (i < n ? " done" : i === n ? " active" : "");
  });
}
function setGuide(html) { document.getElementById("guide").innerHTML = html; }

/* ---- Minesweeper ---- */
function initBoard() {
  const b = document.getElementById("board");
  b.innerHTML = ""; cells = [];
  mines.clear(); revealed.clear(); flagged.clear();
  openCount = 0;
  for (let i = 0; i < TOTAL; i++) {
    const c = document.createElement("div");
    c.className = "cell";
    c.addEventListener("click", () => onLeft(i));
    c.addEventListener("contextmenu", e => { e.preventDefault(); onRight(i); });
    b.appendChild(c); cells.push(c);
  }
  document.getElementById("lcd-mines").textContent = "010";
  document.getElementById("lcd-timer").textContent = "000";
  document.getElementById("face").textContent = "🙂";
}

function placeMines(skip) {
  mines.clear();
  while (mines.size < MINE_N) {
    const r = Math.floor(Math.random() * TOTAL);
    if (r !== skip) mines.add(r);
  }
}

function neighbors(i) {
  const r = Math.floor(i/COLS), c = i%COLS, res = [];
  for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
    if (!dr && !dc) continue;
    const nr=r+dr, nc=c+dc;
    if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS) res.push(nr*COLS+nc);
  }
  return res;
}

function adj(i) { return neighbors(i).filter(n => mines.has(n)).length; }

function reveal(i) {
  if (revealed.has(i) || flagged.has(i)) return;
  revealed.add(i); openCount++;
  const c = cells[i];
  c.className = "cell open";
  if (mines.has(i)) { c.textContent = "💣"; c.classList.add("boom"); return; }
  const n = adj(i);
  if (n > 0) { c.textContent = n; c.classList.add("n" + n); }
  else neighbors(i).forEach(nb => reveal(nb));
}

function onLeft(i) {
  if (state === "dead" || state === "won") return;
  if (flagged.has(i)) return;
  if (state === "idle") {
    state = "playing";
    placeMines(i);
    startTicker();
    document.getElementById("sbtn").disabled = false;
    setGuide("<b>📌 2단계:</b> 타이머가 올라가고 있어요! MHS에서 <span class='action'>검색 시작</span> 을 눌러보세요.");
    setStep(1);
    mlog("Winmine_XP.exe 감지 — 타이머 시작", "w");
    mlog("검색 시작 버튼을 누르세요");
  }
  if (mines.has(i)) {
    state = "dead"; stopTicker();
    mines.forEach(m => { if (!flagged.has(m)) { cells[m].className="cell open"; cells[m].textContent="💣"; } });
    cells[i].classList.add("boom");
    document.getElementById("face").textContent = "😵";
    setGuide("<b>💥 게임 오버!</b> 😵 버튼을 눌러 다시 시작하세요.");
    return;
  }
  reveal(i);
  document.getElementById("lcd-mines").textContent = String(MINE_N - flagged.size).padStart(3,"0");
  if (revealed.size === TOTAL - MINE_N) {
    state = "won"; stopTicker();
    document.getElementById("face").textContent = "😎";
    setGuide("<b>🎉 클리어!</b> 기록: " + gTime + "초 — MHS로 타이머를 1로 바꿔 기록을 조작해보세요!");
  }
}

function onRight(i) {
  if (state !== "playing") return;
  if (revealed.has(i)) return;
  if (flagged.has(i)) { flagged.delete(i); cells[i].textContent=""; cells[i].className="cell"; }
  else { flagged.add(i); cells[i].textContent="🚩"; cells[i].className="cell flag"; }
  document.getElementById("lcd-mines").textContent = String(MINE_N - flagged.size).padStart(3,"0");
}

function startTicker() {
  gTime = 0;
  ticker = setInterval(() => {
    if (gTime < 999) gTime++;
    document.getElementById("lcd-timer").textContent = String(gTime).padStart(3,"0");
  }, 1000);
}
function stopTicker() { if (ticker) { clearInterval(ticker); ticker = null; } }

function resetGame() {
  stopTicker();
  state="idle"; gTime=0; openCount=0;
  searched=false; fRound=0; prevT=0; prevOpen=0; prevFlag=0;
  document.getElementById("sbtn").disabled = true;
  document.getElementById("subbtn").disabled = true;
  document.getElementById("modbtn").disabled = true;
  document.getElementById("modpanel").style.opacity = "0.4";
  document.getElementById("rtbody").innerHTML = "";
  document.getElementById("rcnt").textContent = "-";
  document.getElementById("taddr").textContent = "-";
  document.getElementById("mlog").innerHTML = "";
  document.getElementById("legend").style.display = "none";
  initBoard();
  setStep(0);
  setGuide("<b>📌 1단계:</b> 지뢰찾기 칸을 <span class='action'>클릭</span> 해서 게임을 시작하세요.");
}

/* ---- MHS ---- */
function renderTable(addrList, oldT, oldOpen, oldFlag, newT, newOpen, newFlag, filterMode) {
  const tbody = document.getElementById("rtbody");
  tbody.innerHTML = "";
  addrList.forEach(addr => {
    const info = ADDR_INFO.find(a => a.addr === addr);
    if (!info) return;

    let oldVal, newVal;
    if (info.type === "timer") { oldVal = oldT; newVal = newT; }
    else if (info.type === "open") { oldVal = oldOpen; newVal = newOpen; }
    else if (info.type === "flag") { oldVal = oldFlag; newVal = newFlag; }
    else { oldVal = 0; newVal = 0; }

    const changed = newVal !== oldVal;
    const isTarget = addr === TARGET;
    const isFound = isTarget && filterMode && !changed ? false : isTarget && filterMode;

    const tr = document.createElement("tr");
    if (isFound && filterMode === "final") tr.className = "found";
    else if (!filterMode) tr.className = "cand";
    else if (changed) tr.className = "cand";
    else tr.className = "rem";

    const status = !filterMode
      ? "후보"
      : changed
        ? (isFound && filterMode === "final" ? "★ 타이머 확정!" : "바뀜 — 유지")
        : "그대로 — 제거";

    tr.innerHTML = `
      <td>${addr}</td>
      <td><span class="tag ${info.tag}">${info.type === "timer" ? "타이머" : info.type === "flag" ? "깃발수" : info.type === "open" ? "열린칸" : "빈공간"}</span> ${info.label}</td>
      <td>${oldVal}</td>
      <td>${newVal}</td>
      <td>${status}</td>`;
    tbody.appendChild(tr);
  });
}

function doSearch() {
  if (state === "idle") { mlog("게임을 먼저 시작하세요", "e"); return; }
  prevT = gTime; prevOpen = revealed.size; prevFlag = flagged.size;
  document.getElementById("legend").style.display = "flex";
  renderTable(FILTER_ROUNDS[0], prevT, prevOpen, prevFlag, prevT, prevOpen, prevFlag, null);
  document.getElementById("rcnt").textContent = FILTER_ROUNDS[0].length + "개";
  document.getElementById("subbtn").disabled = false;
  document.getElementById("sbtn").disabled = true;
  searched = true; fRound = 0;
  mlog("검색 완료: 20개 주소 발견");
  mlog("주소별 저장 값의 의미를 확인해보세요!", "w");
  setGuide("<b>📌 3단계:</b> 20개 주소가 검색됐어요. 각 주소에 어떤 값이 저장됐는지 보이죠? 게임을 조금 더 플레이한 후 <span class='action'>서브 검색</span> 을 눌러보세요.<br><small>💡 깃발을 꽂거나 칸을 열면 해당 주소의 값도 바뀌어요!</small>");
  setStep(2);
}

function doSub() {
  if (!searched) { mlog("먼저 검색을 실행하세요", "e"); return; }
  fRound++;
  const oldT2 = prevT, oldOpen2 = prevOpen, oldFlag2 = prevFlag;
  prevT = gTime; prevOpen = revealed.size; prevFlag = flagged.size;

  const prev = FILTER_ROUNDS[Math.min(fRound-1, FILTER_ROUNDS.length-1)];
  const curr = FILTER_ROUNDS[Math.min(fRound, FILTER_ROUNDS.length-1)];

  const isFinal = curr.length === 1;
  renderTable(prev, oldT2, oldOpen2, oldFlag2, prevT, prevOpen, prevFlag, isFinal ? "final" : "filter");

  document.getElementById("rcnt").textContent = curr.length + "개 남음";
  mlog("서브 검색 " + fRound + "회: " + prev.length + "개 → " + curr.length + "개");

  if (isFinal) {
    document.getElementById("taddr").textContent = TARGET;
    document.getElementById("modpanel").style.opacity = "1";
    document.getElementById("modbtn").disabled = false;
    document.getElementById("subbtn").disabled = true;
    mlog("★ 타이머 주소 확정: " + TARGET, "w");
    setGuide("<b>📌 4단계:</b> 타이머 주소를 찾았어요! <br>다른 주소들은 시간이 지나도 값이 안 바뀌었죠? 오직 <b>타이머만 1초마다 증가</b>하기 때문에 특정할 수 있었어요!<br>새 값을 <b>1</b> 로 입력하고 <span class='action'>값 쓰기</span> 를 눌러보세요!");
    setStep(3);
  } else if (curr.length <= 2) {
    setGuide("<b>📌 거의 다 왔어요!</b> " + curr.length + "개 남았어요. 남은 주소들을 보면 열린칸 수도 함께 남아있어요.<br><span class='action'>서브 검색</span> 한 번만 더!");
    mlog("한 번만 더 서브 검색하세요", "w");
  } else {
    setGuide("<b>📌 " + curr.length + "개로 줄었어요!</b> 빈 공간들은 제거됐죠? 이제 타이머·깃발·열린칸 주소만 남았어요.<br>계속 <span class='action'>서브 검색</span> 을 눌러 좁혀가세요.");
    mlog("계속 서브 검색으로 좁혀가세요", "w");
  }
}

function doModify() {
  const v = parseInt(document.getElementById("nval").value);
  if (isNaN(v) || v < 0 || v > 999) { mlog("0~999 사이 값을 입력하세요", "e"); return; }
  stopTicker();
  gTime = v;
  const lcd = document.getElementById("lcd-timer");
  lcd.textContent = String(v).padStart(3,"0");
  if (state === "playing" || state === "won") document.getElementById("face").textContent = "😈";
  mlog("★ 해킹 성공! 타이머 = " + v + "초로 변조!", "w");
  let fl = 0;
  const fi = setInterval(() => {
    lcd.style.color = fl%2===0 ? "#ff0" : "#f00";
    if (++fl > 7) { clearInterval(fi); lcd.style.color = "#f00"; }
  }, 150);
  setGuide(v <= 3
    ? "<b>😈 해킹 완료!</b> " + v + "초 기록! 실제라면 세계 1위예요.<br>핵심: 타이머는 <b>1초마다 혼자 증가</b>하기 때문에 서브 검색으로 특정할 수 있었어요."
    : "<b>😈 해킹 완료!</b> 타이머가 " + v + "초로 변조되었어요.<br>코드를 건드리지 않고 메모리 주소 " + TARGET + " 의 값만 직접 바꿨습니다.");
}

initBoard();
</script>
